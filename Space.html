<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Space</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:auto}
body{font-family:'Segoe UI', system-ui, sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden}
#setlist-view{max-width:900px;margin:0 auto;padding:40px 24px}
.sl-title{font-size:48px;font-weight:700;text-align:center;margin-bottom:12px;color:#111}
.sl-subtitle{text-align:center;color:#888;font-size:18px;margin-bottom:40px}
.sl-btn{display:flex;align-items:center;width:100%;padding:18px 24px;margin-bottom:10px;font-size:28px;text-align:left;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-family:inherit;color:#222;transition:background 0.15s}
.sl-btn:hover,.sl-btn:focus{background:#e8e8e8;border-color:#ccc}
.sl-btn .num{color:#aaa;margin-right:18px;min-width:40px;font-weight:700}
.sl-play-all{display:block;width:100%;padding:18px;margin-top:24px;font-size:24px;font-weight:700;background:#059669;color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;text-align:center;transition:background 0.15s}
.sl-play-all:hover{background:#047857}
#song-view{display:none}
#song-content{padding:5vh 5vw;padding-bottom:100vh;word-wrap:break-word;overflow-wrap:break-word}
.song-title-display{font-weight:700;color:#111;margin-bottom:4px}
.song-artist-display{font-weight:400;color:#666;margin-bottom:20px}
.song-meta-display{font-weight:400;color:#888;font-style:italic;margin-bottom:16px}
.section-header{font-weight:700;color:#333;margin-top:14px;margin-bottom:4px}
.section-chorus{padding-left:16px;border-left:5px solid currentColor}
.chord-line{margin-bottom:4px;line-height:1}
.segment{display:inline-block;vertical-align:top}
.chord-text{display:block;font-weight:700;font-style:italic;white-space:pre}
.lyric-text{display:block;white-space:pre-wrap;line-height:1.3}
.plain-text{line-height:1.3;white-space:pre-wrap}
.grid-line{font-weight:700;white-space:pre-wrap;line-height:1.6}
.comment-text{font-style:italic;color:#777}
.blank-line{}
#progress-bar{position:fixed;top:0;left:0;height:4px;background:#0099cc;z-index:200;transition:width 0.15s linear}
#controls-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(0,0,0,0.88);color:white;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:15px;transition:opacity 0.4s,transform 0.4s;flex-wrap:wrap}
#controls-bar.controls-hidden{opacity:0;transform:translateY(100%);pointer-events:none}
#controls-bar button{background:rgba(255,255,255,0.15);color:white;border:none;border-radius:6px;padding:10px 18px;font-size:16px;cursor:pointer;font-weight:600;font-family:inherit;transition:background 0.15s;min-height:44px}
#controls-bar button:hover{background:rgba(255,255,255,0.25)}
#controls-bar .spacer{flex:1}
#controls-bar .info{font-size:13px;color:#aaa}
#controls-bar .size-label{font-size:13px;color:#aaa;white-space:nowrap}
#btn-play-pause{min-width:90px;background:rgba(37,99,235,0.7)}
#btn-play-pause:hover{background:rgba(37,99,235,0.9)}
.hidden{display:none!important}
@media(max-width:800px){#song-content{padding:16px 12px;padding-bottom:100vh}.sl-btn{font-size:22px;padding:14px 18px}.sl-title{font-size:36px}#controls-bar button{padding:8px 12px;font-size:14px}#controls-bar{gap:6px;padding:8px 12px}}
</style>
</head>

</div>

function changeSize(delta){LS=Math.max(16,Math.min(80,LS+delta));CS=Math.max(12,Math.min(64,CS+Math.round(delta*0.85)));document.getElementById('sizeLabel').textContent=LS+'px';if(currentSongIdx>=0)loadSong(currentSongIdx,false);showControls()}
function updateProgress(){const max=document.body.scrollHeight-window.innerHeight;const pct=max>0?(window.scrollY/max*100):0;document.getElementById('progress-bar').style.width=pct+'%'}
function loadSong(idx,autoPlay){currentSongIdx=idx;isScrolling=false;lastTS=null;const song=SONGS[idx];scrollSpeed=song.speed||35;document.getElementById('speedLabel').textContent='Speed: '+scrollSpeed;document.getElementById('sizeLabel').textContent=LS+'px';document.getElementById('songInfo').textContent=song.title+' ('+(idx+1)+'/'+SONGS.length+')';const content=document.getElementById('song-content');content.innerHTML='';const parsed=parseSong(song.text);if(!parsed.elements.some(e=>e.type==='title')&&song.title){const ti=document.createElement('div');ti.className='song-title-display';ti.style.fontSize=Math.round(LS*1.25)+'px';ti.textContent=song.title;content.appendChild(ti)}for(const el of parsed.elements)content.appendChild(renderEl(el));document.getElementById('setlist-view').classList.add('hidden');document.getElementById('song-view').classList.remove('hidden');document.getElementById('song-view').style.display='block';window.scrollTo(0,0);updateProgress();document.getElementById('btn-play-pause').innerHTML='&#9654; Play';showControls();if(autoPlay)setTimeout(()=>toggleScroll(),1500)}
function backToSetlist(){isScrolling=false;lastTS=null;playAllMode=false;document.getElementById('song-view').classList.add('hidden');document.getElementById('song-view').style.display='none';document.getElementById('setlist-view').classList.remove('hidden');document.getElementById('progress-bar').style.width='0';window.scrollTo(0,0)}
function nextSong(){if(currentSongIdx<SONGS.length-1)loadSong(currentSongIdx+1,false)}
function prevSong(){if(currentSongIdx>0)loadSong(currentSongIdx-1,false)}
function playAll(){playAllMode=true;loadSong(0,true)}
var hideTimer=null;
function showControls(){var bar=document.getElementById('controls-bar');bar.classList.remove('controls-hidden');clearTimeout(hideTimer);hideTimer=setTimeout(function(){if(isScrolling)bar.classList.add('controls-hidden')},4000)}
document.addEventListener('mousemove',showControls);
document.addEventListener('touchstart',showControls);
document.addEventListener('dblclick',function(e){if(document.getElementById('song-view').classList.contains('hidden'))return;e.preventDefault();toggleScroll()});
var lastTap=0;
document.addEventListener('touchend',function(e){var now=Date.now();if(now-lastTap<350){e.preventDefault();if(!document.getElementById('song-view').classList.contains('hidden'))toggleScroll()}lastTap=now});
document.addEventListener('keydown',function(e){showControls();if(document.getElementById('song-view').classList.contains('hidden'))return;var k=e.key;if(k===' '||k==='Enter'){e.preventDefault();toggleScroll()}else if(k==='ArrowUp'){e.preventDefault();changeSpeed(5)}else if(k==='ArrowDown'){e.preventDefault();changeSpeed(-5)}else if(k==='ArrowRight'){e.preventDefault();nextSong()}else if(k==='ArrowLeft'){e.preventDefault();prevSong()}else if(k==='Escape'||k==='Backspace'){e.preventDefault();backToSetlist()}else if(k==='+'||k==='='){e.preventDefault();changeSize(4)}else if(k==='-'||k==='_'){e.preventDefault();changeSize(-4)}});
function init(){document.getElementById('slTitle').textContent=SETTINGS.setlistName;document.getElementById('slSubtitle').textContent=SONGS.length+' songs';var list=document.getElementById('songList');SONGS.forEach(function(s,i){var btn=document.createElement('button');btn.className='sl-btn';btn.innerHTML='<span class="num">'+(i+1)+'</span>'+s.title;btn.onclick=function(){loadSong(i,false)};list.appendChild(btn)});var pa=document.createElement('button');pa.className='sl-play-all';pa.textContent='\u25b6 Play All';pa.onclick=playAll;list.appendChild(pa)}
init();
</script>
</body>
</html>
