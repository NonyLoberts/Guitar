<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:auto}
body{font-family:'Segoe UI', system-ui, sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden}
#setlist-view{max-width:900px;margin:0 auto;padding:40px 24px}
.sl-title{font-size:48px;font-weight:700;text-align:center;margin-bottom:12px;color:#111}
.sl-subtitle{text-align:center;color:#888;font-size:18px;margin-bottom:40px}

.sl-btn:hover,.sl-btn:focus{background:#e8e8e8;border-color:#ccc}
.sl-btn .num{color:#aaa;margin-right:18px;min-width:40px;font-weight:700}
.sl-play-all{display:block;width:100%;padding:18px;margin-top:24px;font-size:24px;font-weight:700;background:#059669;color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;text-align:center;transition:background 0.15s}
.sl-play-all:hover{background:#047857}
#song-view{display:none}
#song-content{padding:50px 80px;padding-bottom:100vh}
.song-title-display{font-weight:700;color:#111;margin-bottom:4px}
.song-artist-display{font-weight:400;color:#666;margin-bottom:20px}
.song-meta-display{font-weight:400;color:#888;font-style:italic;margin-bottom:16px}
.section-header{font-weight:700;color:#333;margin-top:14px;margin-bottom:4px}
.section-chorus{padding-left:16px;border-left:5px solid currentColor}
.chord-line{margin-bottom:4px;line-height:1}
.segment{display:inline-block;vertical-align:top}
.chord-text{display:block;font-weight:700;font-style:italic;white-space:pre}
.lyric-text{display:block;white-space:pre;line-height:1.3}
.plain-text{line-height:1.3}
.grid-line{font-weight:700;white-space:pre;line-height:1.6}
.comment-text{font-style:italic;color:#777}
.blank-line{}
#progress-bar{position:fixed;top:0;left:0;height:4px;background:#0099cc;z-index:200;transition:width 0.15s linear}
#controls-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(0,0,0,0.88);color:white;padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:15px}
#controls-bar button{background:rgba(255,255,255,0.15);color:white;border:none;border-radius:6px;padding:8px 16px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;transition:background 0.15s}
#controls-bar button:hover{background:rgba(255,255,255,0.25)}
#controls-bar .spacer{flex:1}
#controls-bar .info{font-size:13px;color:#aaa}
#btn-play-pause{min-width:80px;background:rgba(37,99,235,0.7)}
#btn-play-pause:hover{background:rgba(37,99,235,0.9)}
.hidden{display:none!important}
@media(max-width:800px){#song-content{padding:24px 20px;padding-bottom:100vh}.sl-btn{font-size:22px;padding:14px 18px}.sl-title{font-size:36px}}
</style>

const SETTINGS={"setlistName":"Space","lyricSize":46,"chordSize":40,"chordColor":"#0099cc","fontFamily":"'Segoe UI', system-ui, sans-serif"};
const DIRECTIVE_ALIASES={t:'title',st:'subtitle',sov:'start_of_verse',eov:'end_of_verse',soc:'start_of_chorus',eoc:'end_of_chorus',sob:'start_of_bridge',eob:'end_of_bridge',sot:'start_of_tab',eot:'end_of_tab',sog:'start_of_grid',eog:'end_of_grid',c:'comment',ci:'comment_italic'};
function parseDirective(line){const m=line.match(/^\{(\w+)(?:\s*:\s*(.*?))?\s*\}$/);return m?{type:m[1].toLowerCase(),value:(m[2]||'').trim()}:null}
function parseChordSegments(line){const segments=[];const re=/\[([^\]]+)\]/g;let li=0,m;while((m=re.exec(line))!==null){if(segments.length>0)segments[segments.length-1].lyric+=line.substring(li,m.index);else if(m.index>0)segments.push({chord:'',lyric:line.substring(0,m.index)});segments.push({chord:m[1],lyric:''});li=m.index+m[0].length}const rem=line.substring(li);if(segments.length>0)segments[segments.length-1].lyric+=rem;else segments.push({chord:'',lyric:rem});return{segments,hasChords:segments.some(s=>s.chord),hasLyrics:segments.some(s=>s.lyric.trim())}}
const CHORD_RE=/^[A-G][#b]?(m|M|maj|min|dim|aug|sus[24]?|add[0-9]*|[0-9]+\/[A-G][#b]?)*(\*)?$/;
const SECTION_RE=/^\[?\s*(Verse|Chorus|Bridge|Intro|Outro|Pre[- ]?Chorus|Interlude|Solo|Tab|Instrumental|Refrain|Coda|Hook|Break)\s*\d*\s*\]?\s*$/i;
function isChordToken(t){return CHORD_RE.test(t)}
function isChordOnlyLine(l){const t=l.trim();if(!t||t.includes('|'))return false;const tk=t.split(/\s+/);return tk.length>0&&tk.every(isChordToken)}
function isSectionLabel(l){return SECTION_RE.test(l.trim())}
function convertCOT(text){const lines=text.split('\n'),res=[];for(let i=0;i<lines.length;i++){const t=lines[i].trim();if(isSectionLabel(t)){res.push('{comment: '+t.replace(/[\[\]]/g,'').trim()+'}');continue}if(isChordOnlyLine(t)){const nl=(i+1<lines.length)?lines[i+1]:'';const nt=nl.trim();if(nt&&!isChordOnlyLine(nt)&&!isSectionLabel(nt)){const cp=[];const re=/(\S+)/g;let m;while((m=re.exec(lines[i]))!==null)if(isChordToken(m[1]))cp.push({chord:m[1],pos:m.index});let cl='';let lp=0;for(const c of cp){cl+=nl.substring(lp,Math.min(c.pos,nl.length))+'['+c.chord+']';lp=c.pos}cl+=nl.substring(lp);res.push(cl);i++}else{res.push(t.split(/\s+/).filter(x=>x!=='|').map(x=>'['+x+']').join(' '))}continue}res.push(lines[i])}return res.join('\n')}

const LS=SETTINGS.lyricSize,CS=SETTINGS.chordSize,CC=SETTINGS.chordColor;
function renderEl(el){const d=document.createElement('div');switch(el.type){case'title':d.className='song-title-display';d.style.fontSize=Math.round(LS*1.25)+'px';d.textContent=el.text;break;case'artist':d.className='song-artist-display';d.style.fontSize=Math.round(LS*0.65)+'px';d.textContent=el.text;break;case'section':d.className='section-header';d.style.fontSize=Math.round(LS*0.8)+'px';d.textContent=el.text+':';break;case'comment':d.className='comment-text';d.style.fontSize=Math.round(LS*0.7)+'px';d.textContent=el.text;break;case'grid':d.className='chord-line';if(el.inChorus){d.classList.add('section-chorus');d.style.borderColor=CC}d.style.fontFamily="'Consolas','Courier New',monospace";d.style.fontSize=CS+'px';d.style.fontWeight='700';d.style.color=CC;d.style.whiteSpace='pre';d.style.lineHeight='1.6';d.textContent=el.text;break;case'line':d.className='chord-line';if(el.inChorus){d.classList.add('section-chorus');d.style.borderColor=CC}if(!el.hasChords){const p=document.createElement('div');p.className='plain-text';p.style.fontSize=LS+'px';p.textContent=el.segments.map(s=>s.lyric).join('');d.appendChild(p)}else{for(const seg of el.segments){const sp=document.createElement('span');sp.className='segment';const ch=document.createElement('span');ch.className='chord-text';ch.style.fontSize=CS+'px';ch.style.color=CC;ch.style.height=Math.round(CS*1.3)+'px';if(seg.chord){ch.textContent=seg.chord}else{ch.innerHTML='&nbsp;';ch.style.visibility='hidden'}sp.appendChild(ch);if(el.hasLyrics){const ly=document.createElement('span');ly.className='lyric-text';ly.style.fontSize=LS+'px';ly.textContent=seg.lyric||' ';sp.appendChild(ly)}d.appendChild(sp)}}break;case'blank':d.className='blank-line';d.style.height=Math.round(LS*0.45)+'px';break}return d}
let scrollSpeed=35,isScrolling=false,lastTS=null,currentSongIdx=-1,playAllMode=false,scrollAccum=0;
function scrollLoop(ts){if(!isScrolling)return;if(lastTS===null){lastTS=ts;requestAnimationFrame(scrollLoop);return}const dt=ts-lastTS;lastTS=ts;scrollAccum+=scrollSpeed*(dt/1000);const px=Math.floor(scrollAccum);if(px>=1){window.scrollBy(0,px);scrollAccum-=px}updateProgress();const maxScroll=document.body.scrollHeight-window.innerHeight;if(maxScroll>10&&window.scrollY>=maxScroll-2){isScrolling=false;lastTS=null;scrollAccum=0;document.getElementById('btn-play-pause').innerHTML='&#9654; Play';if(playAllMode&&currentSongIdx<SONGS.length-1){setTimeout(()=>loadSong(currentSongIdx+1,true),3000)}return}requestAnimationFrame(scrollLoop)}
function toggleScroll(){if(isScrolling){isScrolling=false;lastTS=null;scrollAccum=0;document.getElementById('btn-play-pause').innerHTML='&#9654; Play'}else{isScrolling=true;lastTS=null;scrollAccum=0;document.getElementById('btn-play-pause').innerHTML='&#10074;&#10074; Pause';requestAnimationFrame(scrollLoop)}}
function changeSpeed(delta){scrollSpeed=Math.max(5,Math.min(120,scrollSpeed+delta));document.getElementById('speedLabel').textContent='Speed: '+scrollSpeed}
function updateProgress(){const max=document.body.scrollHeight-window.innerHeight;const pct=max>0?(window.scrollY/max*100):0;document.getElementById('progress-bar').style.width=pct+'%'}
function loadSong(idx,autoPlay){currentSongIdx=idx;isScrolling=false;lastTS=null;const song=SONGS[idx];scrollSpeed=song.speed||35;document.getElementById('speedLabel').textContent='Speed: '+scrollSpeed;document.getElementById('songInfo').textContent=song.title+' ('+(idx+1)+'/'+SONGS.length+')';const content=document.getElementById('song-content');content.innerHTML='';const parsed=parseSong(song.text);if(!parsed.elements.some(e=>e.type==='title')&&song.title){const ti=document.createElement('div');ti.className='song-title-display';ti.style.fontSize=Math.round(LS*1.25)+'px';ti.textContent=song.title;content.appendChild(ti)}for(const el of parsed.elements)content.appendChild(renderEl(el));document.getElementById('setlist-view').classList.add('hidden');document.getElementById('song-view').classList.remove('hidden');document.getElementById('song-view').style.display='block';window.scrollTo(0,0);updateProgress();document.getElementById('btn-play-pause').innerHTML='&#9654; Play';if(autoPlay)setTimeout(()=>toggleScroll(),1500)}
function backToSetlist(){isScrolling=false;lastTS=null;playAllMode=false;document.getElementById('song-view').classList.add('hidden');document.getElementById('song-view').style.display='none';document.getElementById('setlist-view').classList.remove('hidden');document.getElementById('progress-bar').style.width='0';window.scrollTo(0,0)}
function nextSong(){if(currentSongIdx<SONGS.length-1)loadSong(currentSongIdx+1,false)}
function prevSong(){if(currentSongIdx>0)loadSong(currentSongIdx-1,false)}
function playAll(){playAllMode=true;loadSong(0,true)}
document.addEventListener('keydown',function(e){if(document.getElementById('song-view').classList.contains('hidden'))return;switch(e.key){case ' ':case'Enter':e.preventDefault();toggleScroll();break;case'ArrowUp':e.preventDefault();changeSpeed(5);break;case'ArrowDown':e.preventDefault();changeSpeed(-5);break;case'ArrowRight':e.preventDefault();nextSong();break;case'ArrowLeft':e.preventDefault();prevSong();break;case'Escape':case'Backspace':e.preventDefault();backToSetlist();break}});
function init(){document.getElementById('slTitle').textContent=SETTINGS.setlistName;document.getElementById('slSubtitle').textContent=SONGS.length+' songs';const list=document.getElementById('songList');SONGS.forEach(function(s,i){const btn=document.createElement('button');btn.className='sl-btn';btn.innerHTML='<span class="num">'+(i+1)+'</span>'+s.title;btn.onclick=function(){loadSong(i,false)};list.appendChild(btn)});const pa=document.createElement('button');pa.className='sl-play-all';pa.textContent='\u25b6 Play All';pa.onclick=playAll;list.appendChild(pa)}
init();
